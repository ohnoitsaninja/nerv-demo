name: Patch 3D Wireframe Correlator

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-correlator:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Patch index.html correlator implementation
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          correlator_block = r'''      const TAU = Math.PI * 2;

      const correlator = {
        strandCount: 18,
        centerZ: 3.45,
        planes: [
          { y: 0.35, radiusX: 4.15, radiusZ: 2.85, basePhase: 0.05, holdMs: 2200, turnMs: 1400, stepOptions: [-2, -1, 1, 2] },
          { y: 1.95, radiusX: 3.15, radiusZ: 2.20, basePhase: -0.18, holdMs: 2700, turnMs: 1600, stepOptions: [-3, -2, -1, 1, 2, 3] },
          { y: 3.45, radiusX: 2.28, radiusZ: 1.62, basePhase: 0.34, holdMs: 3200, turnMs: 1900, stepOptions: [-4, -3, -2, 2, 3, 4] }
        ]
      };

      const correlatorRng = createRng(941377);
      const correlatorStrands = Array.from({ length: correlator.strandCount }, () => ({
        width: 1.15 + correlatorRng() * 0.85,
        alpha: 0.58 + correlatorRng() * 0.28,
        radialBias: (correlatorRng() - 0.5) * 0.18,
        phaseBias: (correlatorRng() - 0.5) * 0.08
      }));

      const correlatorPlaneState = correlator.planes.map((plane, i) => ({
        currentIndex: 0,
        currentFloat: 0,
        fromIndex: 0,
        toIndex: 0,
        transitionStart: 0,
        nextTrigger: 900 + i * 700,
        lastDelta: i === 0 ? 1 : i === 1 ? -1 : 2,
        inTransition: false
      }));

      function easeInOutQuad(u) {
        return u < 0.5 ? 2 * u * u : 1 - Math.pow(-2 * u + 2, 2) / 2;
      }

      function chooseNextPlaneIndex(plane, state) {
        let options = plane.stepOptions.filter((d) => d !== 0 && d !== -state.lastDelta);
        if (!options.length) options = plane.stepOptions.filter((d) => d !== 0);
        const delta = options[Math.floor(correlatorRng() * options.length)];
        state.lastDelta = delta;
        return state.currentIndex + delta;
      }

      function getPlaneRotationIndex(planeIndex, t) {
        const plane = correlator.planes[planeIndex];
        const state = correlatorPlaneState[planeIndex];

        if (!state.inTransition && t >= state.nextTrigger) {
          state.fromIndex = state.currentIndex;
          state.toIndex = chooseNextPlaneIndex(plane, state);
          state.transitionStart = t;
          state.inTransition = true;
          state.nextTrigger = t + plane.turnMs + plane.holdMs;
        }

        if (state.inTransition) {
          const u = Math.min(1, Math.max(0, (t - state.transitionStart) / plane.turnMs));
          state.currentFloat = state.fromIndex + (state.toIndex - state.fromIndex) * easeInOutQuad(u);
          if (u >= 1) {
            state.currentIndex = state.toIndex;
            state.currentFloat = state.currentIndex;
            state.inTransition = false;
          }
        } else {
          state.currentFloat = state.currentIndex;
        }

        return state.currentFloat;
      }

      function getCorrelatorPoint(strandIndex, planeIndex, t) {
        const plane = correlator.planes[planeIndex];
        const strand = correlatorStrands[strandIndex];
        const rotIndex = getPlaneRotationIndex(planeIndex, t);
        const angle = plane.basePhase + strand.phaseBias + ((strandIndex + rotIndex) / correlator.strandCount) * TAU;
        const breathe = Math.sin(t / 1700 + strandIndex * 0.42 + planeIndex * 0.7) * 0.045;
        const rx = plane.radiusX + strand.radialBias + breathe;
        const rz = plane.radiusZ + strand.radialBias * 0.6 + breathe * 0.6;
        return { x: Math.cos(angle) * rx, y: plane.y, z: correlator.centerZ + Math.sin(angle) * rz };
      }

      function drawSplineThroughPoints(ctx, pts) {
        if (!pts.length) return;
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 0; i < pts.length - 1; i++) {
          const p0 = pts[i - 1] || pts[i];
          const p1 = pts[i];
          const p2 = pts[i + 1];
          const p3 = pts[i + 2] || p2;
          const c1x = p1.x + (p2.x - p0.x) / 6;
          const c1y = p1.y + (p2.y - p0.y) / 6;
          const c2x = p2.x - (p3.x - p1.x) / 6;
          const c2y = p2.y - (p3.y - p1.y) / 6;
          ctx.bezierCurveTo(c1x, c1y, c2x, c2y, p2.x, p2.y);
        }
      }
'''

          text, count = re.subn(
              r"      const wireNodes = Array\.from\(\{ length: 34 \}, \(\) => \(\{.*?\n      \}\)\);\n",
              correlator_block,
              text,
              count=1,
              flags=re.S,
          )
          if count != 1 and 'const correlator = {' not in text:
              raise SystemExit(f'Failed to replace wireNodes block; replacements={count}')

          new_function = r'''      function drawWireframe(t) {
        const canvas = document.getElementById('wireframe');
        const { ctx, w, h } = fitCanvas(canvas);
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, w, h);

        const project = (x, z, y = 0) => {
          const depth = z + 4.2;
          const s = Math.min(w, h) * 0.56 / depth;
          return {
            x: w * 0.52 + x * s,
            y: h * 0.82 - z * h * 0.032 - y * s * 0.74
          };
        };

        ctx.save();
        ctx.strokeStyle = 'rgba(142,229,207,.70)';
        ctx.lineWidth = 1.1;
        ctx.shadowColor = 'rgba(40,241,214,.28)';
        ctx.shadowBlur = 6;
        for (let x = -5; x <= 5; x++) {
          ctx.beginPath();
          for (let z = 0; z <= 8; z += 0.25) {
            const p = project(x, z);
            if (z === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
          }
          ctx.stroke();
        }
        for (let z = 0; z <= 8; z++) {
          ctx.beginPath();
          for (let x = -5; x <= 5; x += 0.25) {
            const p = project(x, z);
            if (x === -5) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
          }
          ctx.stroke();
        }

        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255,255,255,.82)';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        for (let z = 0; z <= 8; z++) {
          for (let x = -5; x <= 5; x++) {
            const p = project(x, z);
            const v = Math.abs((x * 3 + z * 7) % 10);
            if ((x + z) % 2 === 0) ctx.fillText(String(v), p.x, p.y - 2);
          }
        }

        function tower(x, side) {
          ctx.save();
          ctx.strokeStyle = 'rgba(255,122,0,.86)';
          ctx.fillStyle = 'rgba(255,122,0,.70)';
          ctx.shadowColor = 'rgba(255,122,0,.36)';
          ctx.shadowBlur = 8;
          const y0 = h * 0.16;
          const y1 = h * 0.86;
          ctx.strokeRect(x, y0, side, y1 - y0);
          for (let i = 0; i < 18; i++) {
            const y = y0 + 14 + i * ((y1 - y0 - 30) / 17);
            const offset = i % 5 === 0 ? 10 : 0;
            ctx.strokeRect(x + 7 + offset, y, side - 14 - offset, 7);
            if (i % 6 === 1) ctx.fillRect(x + side - 14, y, 8, 7);
          }
          ctx.restore();
        }
        tower(13, 48);
        tower(w - 63, 48);

        ctx.save();
        ctx.strokeStyle = 'rgba(142,229,207,.24)';
        ctx.fillStyle = 'rgba(142,229,207,.65)';
        ctx.lineWidth = 1.0;
        for (let planeIndex = 0; planeIndex < correlator.planes.length; planeIndex++) {
          const loopPts = [];
          for (let i = 0; i < correlator.strandCount; i++) {
            const p3 = getCorrelatorPoint(i, planeIndex, t);
            loopPts.push(project(p3.x, p3.z, p3.y));
          }
          ctx.beginPath();
          loopPts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
          ctx.closePath();
          ctx.stroke();
          for (let i = 0; i < loopPts.length; i += 2) {
            const p = loopPts[i];
            ctx.beginPath();
            ctx.arc(p.x, p.y, 1.5, 0, TAU);
            ctx.fill();
          }
        }
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = 'rgba(255,122,0,.88)';
        ctx.fillStyle = 'rgba(255,176,0,.94)';
        ctx.shadowColor = 'rgba(255,122,0,.55)';
        ctx.shadowBlur = 8;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        for (let i = 0; i < correlator.strandCount; i++) {
          const strand = correlatorStrands[i];
          const p0w = getCorrelatorPoint(i, 0, t);
          const p1w = getCorrelatorPoint(i, 1, t);
          const p2w = getCorrelatorPoint(i, 2, t);
          const p0 = project(p0w.x, p0w.z, p0w.y);
          const p1 = project(p1w.x, p1w.z, p1w.y);
          const p2 = project(p2w.x, p2w.z, p2w.y);
          ctx.globalAlpha = strand.alpha;
          ctx.lineWidth = strand.width;
          ctx.beginPath();
          drawSplineThroughPoints(ctx, [p0, p1, p2]);
          ctx.stroke();
          ctx.globalAlpha = Math.min(1, strand.alpha + 0.15);
          [p0, p1, p2].forEach((p, idx) => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, idx === 1 ? 2.1 : 1.8, 0, TAU);
            ctx.fill();
          });
        }
        ctx.globalAlpha = 1;
        ctx.restore();
      }
'''

          start = text.find('      function drawWireframe(t) {')
          if start < 0:
              raise SystemExit('Could not find drawWireframe start')
          brace_start = text.find('{', start)
          depth = 0
          end = None
          for idx in range(brace_start, len(text)):
              ch = text[idx]
              if ch == '{':
                  depth += 1
              elif ch == '}':
                  depth -= 1
                  if depth == 0:
                      end = idx + 1
                      break
          if end is None:
              raise SystemExit('Could not find drawWireframe end')

          text = text[:start] + new_function + text[end:]
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patched index.html
        shell: bash
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html already patched"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Implement rotating 3-plane wireframe correlator"
          git push
